<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коллекция карт от Chain Foxland</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">

  <style>
    :root {
      --glass: rgba(255,255,255,0.06);
      --accent: #c084fc;
      --common: silver;
      --uncommon: #3cff00;
      --rare: #009dff;
      --epic: #c63cff;
      --legendary: #ff9c00;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      color: #fff;
      text-align: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 1100px;
      margin: 28px auto;
      padding: 20px;
    }

    h1 {
      margin: 10px 0 18px;
      font-size: 2.2rem;
      text-shadow: 0 0 12px var(--accent);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      box-sizing: border-box;
    }

    .input-field:focus {
      box-shadow: 0 0 15px var(--accent);
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(45deg, #7f00ff, #e100ff);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 20px #b993ff;
    }

    .hint {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #8a2be2;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .progress {
      font-size: 1.1em;
      font-weight: 500;
      margin: 10px 20px;
    }

    .error-message {
      background: rgba(255, 80, 80, 0.2);
      border: 1px solid #ff6b6b;
      border-radius: 10px;
      padding: 12px;
      margin: 10px auto;
      max-width: 400px;
      color: #ffb8b8;
    }

    .tabs {
      margin: 20px 0 6px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #111;
      font-weight: 600;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 180px;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      background: rgba(30, 30, 40, 0.8);
      transform: scale(0.9);
      opacity: 0;
      transition: all 0.4s ease;
      border: 2px solid transparent;
    }
    
    .card.show {
      transform: scale(1);
      opacity: 1;
    }

    .card.owned {
      animation: glowPulse 2s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from { box-shadow: 0 0 10px rgba(255,255,255,0.1); }
      to { box-shadow: 0 0 25px currentColor; }
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      background: rgba(0,0,0,0.3);
    }

    .no-img {
      width: 100%;
      height: 240px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font-size: 0.9rem;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card h3 {
      margin: 10px 0 8px;
      font-size: 1.1em;
    }

    .rarity-text {
      font-weight: 600;
      text-shadow: 0 0 5px currentColor;
    }

    .description {
      display: none;
      margin-top: 8px;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .card.expanded .description {
      display: block;
    }

    .card.expanded {
      transform: scale(2) !important;
      z-index: 2000;
      position: fixed;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) scale(1.8) !important;
    }

    .card.common { background: linear-gradient(135deg, rgba(80,80,80,0.9), rgba(50,50,50,0.8)); }
    .card.uncommon { background: linear-gradient(135deg, rgba(0,80,0,0.9), rgba(0,50,0,0.8)); }
    .card.rare { background: linear-gradient(135deg, rgba(0,50,100,0.9), rgba(0,30,70,0.8)); }
    .card.epic { background: linear-gradient(135deg, rgba(60,0,100,0.9), rgba(40,0,70,0.8)); }
    .card.legendary { background: linear-gradient(135deg, rgba(100,50,0,0.9), rgba(70,35,0,0.8)); }

    @media (max-width: 768px) {
      .card { width: calc(50% - 15px) !important; max-width: 160px; }
    }
  </style>
</head>

<body>
<div class="container">
  <h1>Коллекционные карты от Chain Foxland</h1>

  <div class="controls">
    <div class="input-group">
      <input type="text" id="nick" class="input-field" placeholder="Ник на Twitch" />
      <input type="password" id="password" class="input-field" placeholder="Пароль" />
      <button id="btn">Войти</button>
      <div class="hint">🔐 Пароль можно получить у администратора</div>
    </div>
  </div>

  <div id="errorMessage" class="error-message" style="display: none;"></div>
  <div id="loader" class="loader" style="display:none;"></div>
  <div id="progress" class="progress"></div>

  <div class="tabs" id="tabs" style="display:none;">
    <div class="tab active" data-tab="owned">Только мои</div>
    <div class="tab" data-tab="missing">Отсутствуют</div>
    <div class="tab" data-tab="all">Все</div>
  </div>

  <div id="cards" class="cards"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxgxpjGPP1iB0g4_sV0sPdJtrMnvtUd1p9l9yLHPtzcLspqkbcWet6O1R8H_os_4Vdq/exec";

// ШАБЛОН ВСЕХ КАРТ (21 штука)
// ЗАПОЛНИТЕ ЭТОТ МАССИВ ДАННЫМИ ИЗ ВАШЕЙ ТАБЛИЦЫ CARDS
const ALL_CARDS = [
  { id: 1, name: "Название карты 1", rarity: "Обычная", image: "https://...", description: "Описание карты 1" },
  { id: 2, name: "Название карты 2", rarity: "Необычная", image: "https://...", description: "Описание карты 2" },
  { id: 3, name: "Название карты 3", rarity: "Редкая", image: "https://...", description: "Описание карты 3" },
  // ... и так до 21 карты
  { id: 21, name: "Название карты 21", rarity: "Легендарная", image: "https://...", description: "Описание карты 21" }
];

let ownedCardIds = [];  // ID карт игрока (1-21)
let currentMode = "owned";
let expandedCard = null;

const btn = document.getElementById("btn");
const nickInput = document.getElementById("nick");
const passwordInput = document.getElementById("password");
const loader = document.getElementById("loader");
const progressDiv = document.getElementById("progress");
const cardsDiv = document.getElementById("cards");
const tabs = document.getElementById("tabs");
const errorMessage = document.getElementById("errorMessage");

function setLoading(v) {
  loader.style.display = v ? "block" : "none";
  btn.disabled = v;
}

function showError(text) {
  errorMessage.textContent = text;
  errorMessage.style.display = 'block';
  setTimeout(() => {
    errorMessage.style.display = 'none';
  }, 3000);
}

function render() {
  cardsDiv.innerHTML = "";

  let cardsToShow = [];
  
  if (currentMode === "owned") {
    cardsToShow = ALL_CARDS.filter(card => ownedCardIds.includes(card.id));
  } else if (currentMode === "missing") {
    cardsToShow = ALL_CARDS.filter(card => !ownedCardIds.includes(card.id));
  } else {
    cardsToShow = ALL_CARDS;
  }

  if (cardsToShow.length === 0) {
    cardsDiv.innerHTML = '<div style="color: rgba(255,255,255,0.5); padding: 40px;">Нет карт для отображения</div>';
    return;
  }

  cardsToShow.forEach((card, i) => {
    const div = document.createElement("div");
    div.className = `card ${getRarityClass(card.rarity)}`;
    
    const isOwned = ownedCardIds.includes(card.id);
    
    // ВАЖНО: Изображение показываем ТОЛЬКО если карта принадлежит игроку
    const showImage = isOwned && card.image;
    
    div.innerHTML = `
      ${showImage 
        ? `<img src="${card.image}" alt="${card.name}" onerror="this.src='noimage.svg'">`
        : `<div class="no-img">${isOwned ? 'Нет изображения' : '🔒 Карта не в коллекции'}</div>`
      }
      <div class="card-content">
        <h3>${card.name}</h3>
        <p class="rarity-text">${card.rarity}</p>
        <p class="description">${card.description || 'Нет описания'}</p>
      </div>
    `;
    
    if (isOwned) div.classList.add("owned");
    
    div.addEventListener("click", () => {
      if (div.classList.contains("expanded")) {
        div.classList.remove("expanded");
        expandedCard = null;
      } else {
        if (expandedCard) expandedCard.classList.remove("expanded");
        div.classList.add("expanded");
        expandedCard = div;
      }
    });
    
    cardsDiv.appendChild(div);
    setTimeout(() => div.classList.add("show"), i * 50);
  });
}

function getRarityClass(rarity) {
  const map = {
    'Обычная': 'common', 'Common': 'common',
    'Необычная': 'uncommon', 'Uncommon': 'uncommon',
    'Редкая': 'rare', 'Rare': 'rare',
    'Эпическая': 'epic', 'Epic': 'epic',
    'Легендарная': 'legendary', 'Legendary': 'legendary'
  };
  return map[rarity] || 'common';
}

async function load() {
  const nick = nickInput.value.trim();
  const password = passwordInput.value;
  
  if (!nick || !password) {
    showError("Введите ник и пароль");
    return;
  }

  setLoading(true);
  tabs.style.display = "none";
  cardsDiv.innerHTML = "";
  progressDiv.textContent = "Лиса достаёт лапками твои карты...";
  errorMessage.style.display = 'none';

  try {
    const url = `${API}?player=${encodeURIComponent(nick)}&password=${encodeURIComponent(password)}`;
    const res = await fetch(url);
    
    if (!res.ok) throw new Error("Ошибка сервера");
    
    const data = await res.json();
    
    if (data.error) {
      showError("Неверный ник или пароль");
      return;
    }
    
    ownedCardIds = data.ownedCardIds || [];
    progressDiv.textContent = `Уникальных: ${ownedCardIds.length} / ${data.totalUniqueCards}`;
    
    tabs.style.display = "flex";
    render();
    
  } catch (e) {
    showError("Ошибка соединения");
  } finally {
    setLoading(false);
  }
}

btn.addEventListener("click", load);

[nickInput, passwordInput].forEach(input => {
  input.addEventListener("keydown", e => { 
    if (e.key === "Enter") load(); 
  });
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentMode = tab.dataset.tab;
    render();
  });
});

// Цветные рамки
setInterval(() => {
  document.querySelectorAll('.card').forEach(card => {
    const rarityText = card.querySelector('.rarity-text')?.textContent;
    if (!rarityText) return;
    
    const colors = {
      'Обычная': 'silver', 'Обычный': 'silver', 'Common': 'silver',
      'Необычная': '#3cff00', 'Необычный': '#3cff00', 'Uncommon': '#3cff00',
      'Редкая': '#009dff', 'Редкий': '#009dff', 'Rare': '#009dff',
      'Эпическая': '#c63cff', 'Эпический': '#c63cff', 'Epic': '#c63cff',
      'Легендарная': '#ff9c00', 'Легендарный': '#ff9c00', 'Legendary': '#ff9c00'
    };
    
    for (const [key, color] of Object.entries(colors)) {
      if (rarityText.includes(key)) {
        card.style.borderColor = color;
        const raritySpan = card.querySelector('.rarity-text');
        if (raritySpan) raritySpan.style.color = color;
        break;
      }
    }
  });
}, 100);
</script>
</body>
</html>
