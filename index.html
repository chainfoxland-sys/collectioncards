<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коллекция карт от Chain Foxland</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Ваши стили остаются без изменений */
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      color: #fff;
      text-align: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 1100px;
      margin: 28px auto;
      padding: 20px;
    }

    h1 {
      margin: 10px 0 18px;
      font-size: 2.2rem;
      text-shadow: 0 0 12px #c084fc;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      box-sizing: border-box;
    }

    .input-field:focus {
      box-shadow: 0 0 15px #c084fc;
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(45deg, #7f00ff, #e100ff);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 20px #b993ff;
    }

    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #8a2be2;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .error-message {
      background: rgba(255, 80, 80, 0.2);
      border: 1px solid #ff6b6b;
      border-radius: 10px;
      padding: 12px;
      margin: 10px auto;
      max-width: 400px;
      color: #ffb8b8;
    }

    .tabs {
      margin: 20px 0 6px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .tab.active {
      background: #c084fc;
      color: #111;
      font-weight: 600;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 180px;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      background: rgba(30, 30, 40, 0.8);
      transition: all 0.4s ease;
      border: 2px solid transparent;
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .no-img {
      width: 100%;
      height: 240px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card h3 {
      margin: 10px 0 8px;
      font-size: 1.1em;
    }

    .progress {
      font-size: 1.1em;
      margin: 10px 0;
    }

    /* Стили для разных редкостей */
    .card.common { border-color: silver; }
    .card.uncommon { border-color: #3cff00; }
    .card.rare { border-color: #009dff; }
    .card.epic { border-color: #c63cff; }
    .card.legendary { border-color: #ff9c00; }
    
    .rarity-text { font-weight: 600; }
    .card.common .rarity-text { color: silver; }
    .card.uncommon .rarity-text { color: #3cff00; }
    .card.rare .rarity-text { color: #009dff; }
    .card.epic .rarity-text { color: #c63cff; }
    .card.legendary .rarity-text { color: #ff9c00; }
    
    .description { font-size: 0.85rem; opacity: 0.8; margin-top: 8px; display: none; }
    .card.expanded .description { display: block; }
    
    .card.expanded {
      transform: scale(1.8) !important;
      z-index: 2000;
      position: fixed;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) scale(1.8) !important;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }
  </style>
</head>

<body>
<div class="container">
  <h1>Коллекционные карты от Chain Foxland</h1>

  <div class="controls">
    <div class="input-group">
      <input type="text" id="nick" class="input-field" placeholder="Ник на Twitch" />
      <input type="password" id="password" class="input-field" placeholder="Пароль" />
      <button id="btn">Войти</button>
    </div>
  </div>

  <div id="errorMessage" class="error-message" style="display: none;"></div>
  <div id="loader" class="loader" style="display:none;"></div>
  <div id="progress" class="progress"></div>

  <div class="tabs" id="tabs" style="display:none;">
    <div class="tab active" data-tab="owned">Только мои</div>
    <div class="tab" data-tab="missing">Отсутствуют</div>
    <div class="tab" data-tab="all">Все</div>
  </div>

  <div id="cards" class="cards"></div>
</div>

<script>
const API = "ВАШ_URL_GOOGLE_APPS_SCRIPT";
const btn = document.getElementById("btn");
const nickInput = document.getElementById("nick");
const passwordInput = document.getElementById("password");
const loader = document.getElementById("loader");
const progressDiv = document.getElementById("progress");
const cardsDiv = document.getElementById("cards");
const tabs = document.getElementById("tabs");
const errorMessage = document.getElementById("errorMessage");

let allCards = [];
let currentMode = "owned";
let expandedCard = null;
let encryptionKey = "";

// Функция расшифровки URL на клиенте
function decryptUrl(encryptedBase64, key) {
  if (!encryptedBase64 || encryptedBase64 === "") return "";
  if (!encryptedBase64.includes('=')) return encryptedBase64; // Не зашифровано
  
  try {
    // Декодируем base64
    const encrypted = atob(encryptedBase64);
    let decrypted = "";
    for (let i = 0; i < encrypted.length; i++) {
      const charCode = encrypted.charCodeAt(i) ^ key.charCodeAt(i % key.length);
      decrypted += String.fromCharCode(charCode);
    }
    return decrypted;
  } catch (e) {
    console.error("Decryption error:", e);
    return "";
  }
}

function setLoading(v) {
  loader.style.display = v ? "block" : "none";
  btn.disabled = v;
}

function showError(text) {
  errorMessage.textContent = text;
  errorMessage.style.display = 'block';
  setTimeout(() => {
    errorMessage.style.display = 'none';
  }, 3000);
}

function getRarityClass(rarity) {
  const rarityMap = {
    'Обычная': 'common', 'Common': 'common',
    'Необычная': 'uncommon', 'Uncommon': 'uncommon',
    'Редкая': 'rare', 'Rare': 'rare',
    'Эпическая': 'epic', 'Epic': 'epic',
    'Легендарная': 'legendary', 'Legendary': 'legendary'
  };
  return rarityMap[rarity] || 'common';
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function render(mode = "owned") {
  cardsDiv.innerHTML = "";

  let filtered = mode === "owned" 
    ? allCards.filter(c => c.owned === 1)
    : mode === "missing" 
      ? allCards.filter(c => c.owned === 0)
      : allCards;

  if (filtered.length === 0) {
    cardsDiv.innerHTML = '<div style="color: rgba(255,255,255,0.5);">Нет карт для отображения 😢</div>';
    return;
  }

  filtered.forEach((card, i) => {
    const div = document.createElement("div");
    div.className = `card ${getRarityClass(card.rarity)}`;
    
    // Расшифровываем URL только для НЕ принадлежащих карт
    let imageUrl = card.image;
    if (card.owned === 0 && card.isEncrypted && encryptionKey) {
      imageUrl = decryptUrl(card.image, encryptionKey);
    }
    
    const hasImage = imageUrl && imageUrl.length > 4;
    
    div.innerHTML = `
      ${hasImage
        ? `<img src="${imageUrl}" alt="${escapeHtml(card.name)}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23fff%22%3ENo%20image%3C%2Ftext%3E%3C%2Fsvg%3E'">`
        : `<div class="no-img">🔒 Изображение скрыто</div>`
      }
      <div class="card-content">
        <h3>${escapeHtml(card.name)}</h3>
        <p class="rarity-text">${escapeHtml(card.rarity)}</p>
        <p class="description">Количество: ${card.count}</p>
        <p class="description">${escapeHtml(card.description)}</p>
      </div>
    `;
    
    // Добавляем обработчик для увеличения карты
    div.addEventListener("click", (e) => {
      e.stopPropagation();
      if (div.classList.contains("expanded")) {
        div.classList.remove("expanded");
        expandedCard = null;
      } else {
        if (expandedCard) {
          expandedCard.classList.remove("expanded");
        }
        div.classList.add("expanded");
        expandedCard = div;
      }
    });
    
    cardsDiv.appendChild(div);
    // Анимация появления
    setTimeout(() => div.style.opacity = "1", i * 50);
  });
}

async function load() {
  const nick = nickInput.value.trim();
  const password = passwordInput.value;
  
  if (!nick || !password) {
    showError("Введите ник и пароль");
    return;
  }

  setLoading(true);
  tabs.style.display = "none";
  cardsDiv.innerHTML = "";
  progressDiv.textContent = "Загрузка ваших карт...";
  errorMessage.style.display = 'none';
  expandedCard = null;

  try {
    const url = `${API}?player=${encodeURIComponent(nick)}&password=${encodeURIComponent(password)}`;
    const response = await fetch(url);
    
    if (!response.ok) throw new Error("Ошибка сервера");

    const data = await response.json();
    
    if (data.error) {
      showError(data.message || "Ошибка авторизации");
      setLoading(false);
      return;
    }

    // Сохраняем ключ шифрования
    encryptionKey = data.encryptionKey || "";
    
    allCards = data.cards || [];
    progressDiv.textContent = `Уникальных: ${data.ownedUniqueCards} / ${data.totalUniqueCards} (${data.progressPercent}%)`;
    
    tabs.style.display = "flex";
    render(currentMode);

  } catch (e) {
    console.error(e);
    showError("Ошибка соединения с сервером");
  } finally {
    setLoading(false);
  }
}

// Event listeners
btn.addEventListener("click", load);

[nickInput, passwordInput].forEach(input => {
  input.addEventListener("keydown", e => { 
    if (e.key === "Enter") load(); 
  });
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentMode = tab.dataset.tab;
    expandedCard = null;
    render(currentMode);
  });
});

// Восстановление последнего ника
const savedNick = localStorage.getItem('last_nick');
if (savedNick) {
  nickInput.value = savedNick;
  passwordInput.focus();
}

// Сохраняем ник после успешного входа
function saveNick() {
  localStorage.setItem('last_nick', nickInput.value.trim());
}

// Добавляем сохранение при успешной загрузке
const originalLoad = load;
window.load = async function() {
  await originalLoad();
  if (nickInput.value.trim()) {
    localStorage.setItem('last_nick', nickInput.value.trim());
  }
};
load = window.load;
</script>
</body>
</html>
