<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коллекция карт от Chain Foxland</title>
  
  <!-- Подключаем красивый шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="icon" href="data:,">

  <style>
    :root {
      --glass: rgba(255,255,255,0.06);
      --accent: #c084fc;
      --common: silver;
      --uncommon: #3cff00;
      --rare: #009dff;
      --epic: #c63cff;
      --legendary: #ff9c00;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      color: #fff;
      text-align: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 1100px;
      margin: 28px auto;
      padding: 20px;
    }

    h1 {
      margin: 10px 0 18px;
      font-size: 2.2rem;
      text-shadow: 0 0 12px var(--accent);
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      box-sizing: border-box;
    }

    .input-field:focus {
      box-shadow: 0 0 15px var(--accent);
    }

    .input-field::placeholder {
      color: rgba(255,255,255,0.5);
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(45deg, #7f00ff, #e100ff);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 20px #b993ff;
    }

    .hint {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-top: 5px;
      text-align: center;
    }

    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #8a2be2;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: 20px auto 10px auto;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .progress {
      font-size: 1.1em;
      font-weight: 500;
      margin: 10px 20px 20px 20px;
      font-style: italic;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .error-message {
      background: rgba(255, 80, 80, 0.2);
      border: 1px solid #ff6b6b;
      border-radius: 10px;
      padding: 12px;
      margin: 10px auto;
      max-width: 400px;
      color: #ffb8b8;
    }

    .tabs {
      margin: 20px 0 6px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #111;
      font-weight: 600;
    }

    /* --- Карточки --- */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 180px;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      background: rgba(30, 30, 40, 0.8);
      transform: scale(0.9);
      opacity: 0;
      transition: all 0.4s ease;
      position: relative;
      border: 2px solid transparent;
      backdrop-filter: blur(10px);
    }
    
    .card.show {
      transform: scale(1);
      opacity: 1;
    }

    /* Анимированное свечение для карточек в наличии */
    .card.owned {
      animation: glowPulse 2s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from {
        box-shadow: 0 0 10px rgba(255,255,255,0.1);
      }
      to {
        box-shadow: 0 0 25px currentColor;
      }
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      background: rgba(0,0,0,0.3);
      display: block;
      transition: transform 0.4s ease;
    }

    .no-img {
      width: 100%;
      height: 240px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font-size: 0.9rem;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card h3 {
      margin: 10px 0 8px;
      font-size: 1.1em;
      font-weight: 600;
      text-align: center;
      font-family: "Exo 2", sans-serif;
    }

    .card p {
      margin-bottom: 8px;
      font-size: 0.9em;
      text-align: center;
    }

    /* Цвет текста редкости */
    .rarity-text {
      font-weight: 600;
      text-shadow: 0 0 5px currentColor;
      font-family: "Exo 2", sans-serif;
    }

    /* Описание спрятано */
    .description {
      display: none;
      margin-top: 8px;
      font-size: 0.85rem;
      opacity: 0.8;
      text-align: center;
      line-height: 1.4;
      font-family: "Exo 2", sans-serif;
    }

    /* Показываем при увеличении */
    .card.expanded .description {
      display: block;
    }

    .card.expanded {
      transform: scale(2) !important;
      z-index: 2000;
      position: fixed;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) scale(1.8) !important;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }

    /* Темные фоны для разных редкостей */
    .card.common {
      background: linear-gradient(135deg, rgba(80, 80, 80, 0.9), rgba(50, 50, 50, 0.8));
    }
    .card.uncommon {
      background: linear-gradient(135deg, rgba(0, 80, 0, 0.9), rgba(0, 50, 0, 0.8));
    }
    .card.rare {
      background: linear-gradient(135deg, rgba(0, 50, 100, 0.9), rgba(0, 30, 70, 0.8));
    }
    .card.epic {
      background: linear-gradient(135deg, rgba(60, 0, 100, 0.9), rgba(40, 0, 70, 0.8));
    }
    .card.legendary {
      background: linear-gradient(135deg, rgba(100, 50, 0, 0.9), rgba(70, 35, 0, 0.8));
    }

    /* Мобильная версия */
    @media (max-width: 768px) {
      .cards {
        gap: 15px;
        padding: 15px;
      }
      
      .card {
        width: calc(50% - 15px) !important;
        min-width: unset;
        max-width: 160px;
      }
      
      .loader {
        margin: 15px auto 8px auto;
      }
      
      .progress {
        margin: 5px 15px 15px 15px;
      }
    }

    @media (max-width: 600px) {
      .card.expanded {
        transform: translate(-50%, -50%) scale(1.3) !important;
        width: 90vw;
        max-width: 280px;
      }
      
      .container {
        padding: 10px;
        margin: 15px auto;
      }
      
      h1 {
        font-size: 1.8rem;
        margin: 5px 0 12px;
      }
      
      .input-group {
        max-width: 300px;
      }
    }

    /* Для очень маленьких экранов */
    @media (max-width: 400px) {
      .card {
        width: calc(50% - 10px) !important;
        max-width: 140px;
      }
      
      .cards {
        gap: 10px;
        padding: 10px;
      }
    }

    /* Фикс для контейнера загрузки */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>Коллекционные карты от Chain Foxland</h1>

  <div class="controls">
    <div class="input-group">
      <input type="text" id="nick" class="input-field" placeholder="Ник на Twitch" autocomplete="username" />
      <input type="password" id="password" class="input-field" placeholder="Пароль" autocomplete="current-password" />
      <button id="btn">Войти</button>
      <div class="hint">🔐 Пароль можно получить у администратора</div>
    </div>
  </div>

  <div id="errorMessage" class="error-message" style="display: none;"></div>

  <div class="loading-container">
    <div id="loader" style="display:none;" class="loader"></div>
    <div id="progress" class="progress"></div>
  </div>

  <div class="tabs" id="tabs" style="display:none;">
    <div class="tab active" data-tab="owned">Только мои</div>
    <div class="tab" data-tab="missing">Отсутствуют</div>
    <div class="tab" data-tab="all">Все</div>
  </div>

  <div id="cards" class="cards"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx_AqN39ZN2iccPXi9HgyGrICJATsmVzGq8M9o-o9DHgMRXjdmt6sXkpWAeEuLGRUqv/exec";

const btn = document.getElementById("btn");
const nickInput = document.getElementById("nick");
const passwordInput = document.getElementById("password");
const loader = document.getElementById("loader");
const progressDiv = document.getElementById("progress");
const cardsDiv = document.getElementById("cards");
const tabs = document.getElementById("tabs");
const errorMessage = document.getElementById("errorMessage");

let allCards = [];
let currentMode = "owned";
let expandedCard = null;
let encryptionKey = "";

// Функция расшифровки URL (только для защиты)
function decryptUrl(encryptedBase64, key) {
  if (!encryptedBase64 || encryptedBase64 === "") return "";
  try {
    const encrypted = atob(encryptedBase64);
    let decrypted = "";
    for (let i = 0; i < encrypted.length; i++) {
      const charCode = encrypted.charCodeAt(i) ^ key.charCodeAt(i % key.length);
      decrypted += String.fromCharCode(charCode);
    }
    return decrypted;
  } catch (e) {
    return "";
  }
}

// Пытаемся восстановить последний ник
const savedNick = localStorage.getItem('last_nick');
if (savedNick) {
  nickInput.value = savedNick;
  passwordInput.focus();
}

/* === LOADING === */
function setLoading(v) {
  loader.style.display = v ? "block" : "none";
  btn.disabled = v;
  nickInput.disabled = v;
  passwordInput.disabled = v;
}

/* === ПОКАЗ ОШИБКИ === */
function showError(text) {
  errorMessage.textContent = text;
  errorMessage.style.display = 'block';
  setTimeout(() => {
    errorMessage.style.display = 'none';
  }, 3000);
}

/* === RENDER === */
function render(mode="owned") {
  cardsDiv.innerHTML = "";

  let filtered =
    mode === "owned" ? allCards.filter(c => c.owned)
    : mode === "missing" ? allCards.filter(c => !c.owned)
    : allCards;

  filtered.forEach((c,i) => {
    const div = document.createElement("div");
    div.className = "card";

    // ТОЛЬКО ЗДЕСЬ ЗАЩИТА - расшифровываем URL для чужих карт
    let imageUrl = c.image;
    if (!c.owned && c.isEncrypted && encryptionKey) {
      imageUrl = decryptUrl(c.image, encryptionKey);
    }
    
    const imageVisible = c.owned ? (c.image && c.image.length > 4) : (imageUrl && imageUrl.length > 4);

    div.innerHTML = `
      ${imageVisible
        ? `<img src="${imageUrl}" alt="${c.name}" onerror="this.src='noimage.svg'">`
        : `<div class="no-img">${!c.owned ? '🔒 Изображение скрыто' : 'Нет изображения'}</div>`
      }
      <div class="card-content">
        <h3>${c.name}</h3>
        <p class="rarity-text">${c.rarity}</p>
        <p class="description">Количество: ${c.count}</p>
        <p class="description">${c.description}</p>
      </div>
    `;

    div.addEventListener("click", () => {
      if (div.classList.contains("expanded")) {
        div.classList.remove("expanded");
        expandedCard = null;
      } else {
        if (expandedCard) {
          expandedCard.classList.remove("expanded");
        }
        div.classList.add("expanded");
        expandedCard = div;
      }
    });

    cardsDiv.appendChild(div);
    setTimeout(() => div.classList.add("show"), 50 * i);
  });
}

/* === LOAD DATA === */
async function load() {
  const nick = nickInput.value.trim();
  const password = passwordInput.value;
  
  if (!nick || !password) {
    showError("Введите ник и пароль");
    return;
  }

  setLoading(true);
  tabs.style.display = "none";
  cardsDiv.innerHTML = "";
  progressDiv.textContent = "Лиса достаёт лапками твои карты...";
  errorMessage.style.display = 'none';
  expandedCard = null;

  try {
    const url = `${API}?player=${encodeURIComponent(nick)}&password=${encodeURIComponent(password)}`;
    const res = await fetch(url);
    
    if (!res.ok) throw new Error("Сервер вернул ошибку " + res.status);

    const data = await res.json();
    
    if (data.error) {
      showError("Неверный ник или пароль");
      setLoading(false);
      return;
    }

    localStorage.setItem('last_nick', nick);
    
    // Сохраняем ключ для расшифровки
    encryptionKey = data.encryptionKey || "";

    allCards = data.cards || [];
    progressDiv.textContent = `Уникальных: ${data.ownedUniqueCards} / ${data.totalUniqueCards}`;

    tabs.style.display = "flex";
    render(currentMode);

  } catch (e) {
    showError("Ошибка соединения");
    console.error(e);
  } finally {
    setLoading(false);
  }
}

/* === EVENTS === */
btn.addEventListener("click", load);

[nickInput, passwordInput].forEach(input => {
  input.addEventListener("keydown", e => { 
    if (e.key === "Enter") load(); 
  });
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentMode = tab.dataset.tab;
    expandedCard = null;
    render(currentMode);
  });
});

// Скрипт для цветных рамок, свечения и фонов (ваш оригинальный)
setInterval(() => {
  document.querySelectorAll('.card').forEach(card => {
    const rarityText = card.querySelector('.rarity-text')?.textContent;
    if (!rarityText) return;
    
    const colors = {
      'Обычная': 'silver', 'Обычный': 'silver', 'Common': 'silver',
      'Необычная': '#3cff00', 'Необычный': '#3cff00', 'Uncommon': '#3cff00',
      'Редкая': '#009dff', 'Редкий': '#009dff', 'Rare': '#009dff',
      'Эпическая': '#c63cff', 'Эпический': '#c63cff', 'Epic': '#c63cff',
      'Легендарная': '#ff9c00', 'Легендарный': '#ff9c00', 'Legendary': '#ff9c00'
    };
    
    for (const [key, color] of Object.entries(colors)) {
      if (rarityText.includes(key)) {
        card.style.borderColor = color;
        card.style.color = color;
        const raritySpan = card.querySelector('.rarity-text');
        if (raritySpan) raritySpan.style.color = color;
        
        const rarityClass = key.toLowerCase();
        card.classList.add(rarityClass);
        
        const isOwned = !card.querySelector('.no-img') || card.querySelector('.no-img')?.textContent !== '🔒 Изображение скрыто';
        if (isOwned) {
          card.classList.add('owned');
        }
        break;
      }
    }
  });
}, 100);
</script>
</body>
</html>
